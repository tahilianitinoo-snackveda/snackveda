kind = "web"
previewPath = "/"
title = "SnackVeda"
version = "1.0.0"
id = "artifacts/snackveda"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24714

[services.development]
run = "pnpm --filter @workspace/snackveda run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/snackveda", "run", "build" ]
publicDir = "artifacts/snackveda/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24714"
BASE_PATH = "/"
