[build]
  command = "pnpm install --no-frozen-lockfile && pnpm run build:frontend"
  publish = "artifacts/snackveda/dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.9"

# Proxy all /api/* requests to the Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — all non-file routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["pg", "bcryptjs"]
